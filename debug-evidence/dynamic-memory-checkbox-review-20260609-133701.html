<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>动态记忆勾选审阅</title>
<style>
:root{--bg:#f6f3ef;--card:#fffdfa;--ink:#24201d;--muted:#8b8178;--line:#e6ddd3;--accent:#8f6bff;--bad:#d94848;--mid:#bc7a1f;--ok:#78906f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}header{position:sticky;top:0;z-index:5;padding:16px 18px 12px;background:rgba(246,243,239,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}h1{margin:0 0 8px;font-size:20px}.meta{color:var(--muted);font-size:13px;line-height:1.55}.toolbar{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}.search{width:100%;min-height:42px;border:1px solid var(--line);border-radius:12px;padding:0 12px;background:#fff;font-size:15px;outline:none}.chips,.actions{display:flex;gap:8px;overflow-x:auto}.chip,.btn,.file-label{border:1px solid var(--line);border-radius:999px;background:#fff;padding:8px 12px;color:var(--ink);font-size:13px;white-space:nowrap;cursor:pointer}.chip.active{border-color:var(--accent);color:var(--accent);background:#f0ebff}#file{display:none}main{max-width:920px;margin:0 auto;padding:14px 14px 96px}.card{display:grid;grid-template-columns:42px 1fr;gap:12px;margin:10px 0;padding:14px;border:1px solid var(--line);border-radius:16px;background:var(--card);box-shadow:0 8px 24px rgba(39,31,23,.04)}.card.checked{border-color:rgba(143,107,255,.55);background:#fbf8ff}.check{width:28px;height:28px;margin-top:2px;accent-color:var(--accent);cursor:pointer}.topline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}.badge{border-radius:999px;padding:4px 8px;font-size:11px;font-weight:700}.HIGH{color:#fff;background:var(--bad)}.MEDIUM{color:#fff;background:var(--mid)}.LOW{color:#fff;background:#7b8794}.OK{color:#fff;background:var(--ok)}.tag{background:#eee8df;color:#6f6258}.imp{background:#eef1ea;color:#65745f}.id{min-width:0;max-width:100%;overflow-wrap:anywhere;color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px}.content{font-size:16px;line-height:1.75;overflow-wrap:anywhere;white-space:pre-wrap}.reason{margin-top:10px;color:var(--muted);font-size:13px;line-height:1.5}.dates{margin-top:8px;color:#aaa096;font-size:12px;line-height:1.45;overflow-wrap:anywhere}.empty{text-align:center;color:var(--muted);padding:42px 18px;line-height:1.8}textarea{position:fixed;left:14px;right:14px;bottom:14px;width:calc(100% - 28px);height:70px;border:1px solid var(--line);border-radius:14px;padding:10px;font-size:12px;background:#fff;box-shadow:0 10px 28px rgba(39,31,23,.12)}@media(min-width:760px){.toolbar{grid-template-columns:1fr auto;align-items:start}.actions{justify-content:flex-end}textarea{left:50%;right:auto;width:min(892px,calc(100% - 28px));transform:translateX(-50%)}}
</style>
</head>
<body>
<header>
<h1>动态记忆勾选审阅</h1>
<div class="meta">总数 <b id="total">0</b>；已勾 <b id="checkedCount">0</b>。先导入旁边的 JSON，再勾“不全”。底部会自动生成结果。</div>
<div class="toolbar"><input id="search" class="search" placeholder="搜内容 / id / tag" /><div class="actions"><label class="file-label" for="file">导入 JSON</label><input id="file" type="file" accept="application/json,.json" /><button class="btn" id="onlyChecked">只看已勾</button><button class="btn" id="copyJson">复制勾选 JSON</button><button class="btn" id="clearChecked">清空勾选</button></div></div>
<div class="chips" id="chips"></div>
</header>
<main id="list"><div class="empty">点“导入 JSON”，选择旁边的 <b>dynamic-memory-checkbox-review-20260609-133701.json</b>。</div></main>
<textarea id="output" readonly placeholder="勾选后这里会出现 JSON"></textarea>
<script>
let ITEMS=[];const KEY='dynamic-memory-checkbox-review-20260609-133701';let checked=new Set(loadChecked());let level='ALL';let onlyChecked=false;const list=document.getElementById('list');const output=document.getElementById('output');const search=document.getElementById('search');const chips=document.getElementById('chips');
function loadChecked(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return[]}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(Array.from(checked)))}catch(e){}}
function esc(s){return String(s??'').replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]})}
function cls(s){return String(s??'').replace(/[^A-Za-z0-9_-]/g,'')}
function selected(){return ITEMS.filter(function(x){return checked.has(x.id)})}
function refreshOutput(){document.getElementById('total').textContent=ITEMS.length;document.getElementById('checkedCount').textContent=checked.size;output.value=JSON.stringify(selected().map(function(x){return {id:x.id,action:'incomplete',tag:x.tag,content:x.content}}),null,2)}
function renderChips(){const levels=['ALL','HIGH','MEDIUM','LOW','OK'];chips.innerHTML='';levels.forEach(function(lv){const n=lv==='ALL'?ITEMS.length:ITEMS.filter(function(x){return x.suspect_level===lv}).length;const b=document.createElement('button');b.className='chip'+(level===lv?' active':'');b.textContent=lv+' '+n;b.onclick=function(){level=lv;render()};chips.appendChild(b)})}
function visible(){const q=search.value.trim().toLowerCase();return ITEMS.filter(function(x){if(level!=='ALL'&&x.suspect_level!==level)return false;if(onlyChecked&&!checked.has(x.id))return false;if(!q)return true;return (String(x.content||'')+' '+String(x.id||'')+' '+String(x.tag||'')).toLowerCase().includes(q)})}
function render(){renderChips();refreshOutput();if(!ITEMS.length){list.innerHTML='<div class="empty">点“导入 JSON”，选择旁边那个 dynamic-memory-checkbox-review-20260609-133701.json。</div>';return}const rows=visible();list.innerHTML='';if(!rows.length){list.innerHTML='<div class="empty">没有匹配项</div>';return}rows.forEach(function(x){const card=document.createElement('section');card.className='card'+(checked.has(x.id)?' checked':'');const cb=document.createElement('input');cb.type='checkbox';cb.className='check';cb.checked=checked.has(x.id);cb.onchange=function(){cb.checked?checked.add(x.id):checked.delete(x.id);save();render()};const body=document.createElement('div');const reason=x.reasons&&x.reasons.length?x.reasons.join('；'):'自动规则未判残缺';body.innerHTML='<div class="topline"><span class="badge '+cls(x.suspect_level)+'">'+esc(x.suspect_level)+' '+esc(x.suspect_score)+'</span><span class="badge tag">'+esc(x.tag||'-')+'</span><span class="badge imp">imp '+esc(x.importance??'-')+'</span><span class="id">'+esc(x.id)+'</span></div><div class="content">'+esc(x.content)+'</div><div class="reason">'+esc(reason)+'</div><div class="dates">created: '+esc(x.created_at||'-')+'<br>last: '+esc(x.last_mentioned||'-')+'</div>';card.appendChild(cb);card.appendChild(body);list.appendChild(card)})}
function normalize(raw){const data=raw&&Array.isArray(raw.items)?raw.items:(Array.isArray(raw)?raw:[]);return data.filter(function(x){return x&&x.id}).map(function(x){x.suspect_level=x.suspect_level||'OK';x.suspect_score=Number(x.suspect_score||0);x.reasons=Array.isArray(x.reasons)?x.reasons:[];return x})}
document.getElementById('file').onchange=async function(ev){const file=ev.target.files&&ev.target.files[0];if(!file)return;try{ITEMS=normalize(JSON.parse(await file.text()));render()}catch(e){list.innerHTML='<div class="empty">JSON 读取失败：'+esc(e&&e.message||e)+'</div>'}};
search.oninput=render;document.getElementById('onlyChecked').onclick=function(){onlyChecked=!onlyChecked;this.textContent=onlyChecked?'显示全部':'只看已勾';render()};document.getElementById('clearChecked').onclick=function(){checked.clear();save();render()};document.getElementById('copyJson').onclick=async function(){try{await navigator.clipboard.writeText(output.value||'[]');alert('已复制')}catch(e){output.select();document.execCommand('copy');alert('已复制')}};render();
</script>
</body>
</html>
