<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>气泡自定义</title>
  <style>
    :root {
      --page: #f5f3ef;
      --ink: #272421;
      --muted: #8f8980;
      --line: rgba(65, 58, 48, 0.1);
      --panel: rgba(255, 255, 255, 0.78);
      --bubble-bg: #fffdf9;
      --bubble-width: 260px;
      --bubble-render-width: fit-content;
      --bubble-height: 0px;
      --bubble-radius: 18px;
      --bubble-pad-x: 12px;
      --bubble-pad-y: 6px;
      --bubble-line: 1.45;
      --bubble-edge-blur: 0px;
      --bubble-shadow-y: 1px;
      --bubble-shadow-blur: 2px;
      --bubble-shadow-opacity: 0.05;
      --sticker-opacity: 0.58;
      --text-size: 13px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,0.9), transparent 26%),
        radial-gradient(circle at 90% 8%, rgba(230,224,214,0.42), transparent 26%),
        var(--page);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(360px, 1fr) 420px;
      gap: 26px;
      min-height: 100vh;
      padding: 28px;
    }

    .preview-pane,
    .control-pane {
      min-width: 0;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      font-weight: 760;
    }

    .subtitle {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .stage-shell {
      position: sticky;
      top: 28px;
      overflow: hidden;
      min-height: calc(100vh - 56px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 36px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.58), rgba(255,255,255,0.24)),
        #eeeae3;
      box-shadow: 0 28px 70px rgba(66, 58, 48, 0.12);
    }

    .stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 56px);
      padding: 68px 32px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.24) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,0.24) 1px, transparent 1px);
      background-size: 34px 34px;
    }

    .phone {
      position: relative;
      width: min(430px, 100%);
      min-height: 620px;
      border-radius: 38px;
      background:
        linear-gradient(180deg, rgba(250,250,249,0.82), rgba(238,235,229,0.7));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 18px 45px rgba(93,84,73,0.16);
      padding: 42px 24px;
    }

    .phone-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 72px;
      color: rgba(39,36,33,0.42);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .bubble-wrap {
      position: relative;
      width: min(100%, calc(var(--bubble-width) + 52px));
      margin: 0 auto;
      padding: 26px;
    }

    .bubble-core {
      position: relative;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: var(--bubble-render-width);
      max-width: min(100%, var(--bubble-width));
      min-height: var(--bubble-height);
      margin: 0 auto;
      border-radius: var(--bubble-radius);
      background: var(--bubble-bg);
      box-shadow:
        0 var(--bubble-shadow-y) var(--bubble-shadow-blur) rgba(70, 63, 54, var(--bubble-shadow-opacity)),
        inset 0 1px 0 rgba(255,255,255,0.72);
      padding: var(--bubble-pad-y) var(--bubble-pad-x);
      color: #56524d;
    }

    .bubble-core::before {
      content: "";
      position: absolute;
      inset: -2px;
      z-index: -1;
      border-radius: inherit;
      background: inherit;
      filter: blur(var(--bubble-edge-blur));
      opacity: var(--edge-blur-opacity, 0.55);
    }

    .bubble-core::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      border-radius: inherit;
      pointer-events: none;
      opacity: var(--material-texture-opacity, 0);
      background: var(--material-texture, none);
      mix-blend-mode: multiply;
    }

    .bubble-core[data-material="emboss"] {
      box-shadow:
        inset 8px 8px 18px rgba(167, 158, 144, 0.2),
        inset -10px -10px 22px rgba(255, 255, 255, 0.92),
        0 var(--bubble-shadow-y) var(--bubble-shadow-blur) rgba(70, 63, 54, var(--bubble-shadow-opacity));
    }

    .bubble-core[data-material="jelly"] {
      overflow: hidden;
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.86),
        inset 0 -16px 28px rgba(208, 200, 188, 0.18),
        0 var(--bubble-shadow-y) var(--bubble-shadow-blur) rgba(70, 63, 54, var(--bubble-shadow-opacity));
    }

    .bubble-core[data-material="jelly"] .bubble-text {
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.56);
    }

    .bubble-core[data-material="frosted"] {
      border: 1px solid rgba(255, 255, 255, 0.54);
      backdrop-filter: blur(18px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.62),
        0 var(--bubble-shadow-y) var(--bubble-shadow-blur) rgba(70, 63, 54, var(--bubble-shadow-opacity));
    }

    .bubble-core[data-material="pixel"] {
      --pixel-step: 12px;
      border-radius: 0;
      clip-path: polygon(
        0 var(--pixel-step),
        var(--pixel-step) var(--pixel-step),
        var(--pixel-step) 0,
        calc(100% - var(--pixel-step)) 0,
        calc(100% - var(--pixel-step)) var(--pixel-step),
        100% var(--pixel-step),
        100% calc(100% - var(--pixel-step)),
        calc(100% - var(--pixel-step)) calc(100% - var(--pixel-step)),
        calc(100% - var(--pixel-step)) 100%,
        var(--pixel-step) 100%,
        var(--pixel-step) calc(100% - var(--pixel-step)),
        0 calc(100% - var(--pixel-step))
      );
      image-rendering: pixelated;
      filter:
        drop-shadow(5px 5px 0 rgba(112, 105, 94, 0.16))
        drop-shadow(10px 10px 0 rgba(112, 105, 94, 0.08));
      box-shadow:
        inset 0 0 0 4px rgba(119, 112, 101, 0.18),
        inset 4px 4px 0 rgba(255, 255, 255, 0.72),
        inset -4px -4px 0 rgba(119, 112, 101, 0.12);
    }

    .bubble-core[data-material="pixel"]::before {
      inset: -4px;
      border-radius: 0;
      background: #8e8679;
      filter: none;
      opacity: 0.16;
      clip-path: inherit;
      transform: translate(4px, 4px);
    }

    .bubble-core[data-material="pixel"]::after {
      inset: auto;
      top: 15px;
      right: 22px;
      width: 7px;
      height: 7px;
      border-radius: 0;
      opacity: 0.34;
      background: #7f786d;
      box-shadow:
        -18px 10px 0 #7f786d,
        16px 18px 0 #7f786d,
        -236px 68px 0 #7f786d,
        -216px 82px 0 #7f786d,
        -198px 64px 0 #7f786d;
      mix-blend-mode: multiply;
    }

    .bubble-core[data-material="pixel"] .bubble-text {
      font-family: "Courier New", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "PingFang SC", "Microsoft YaHei", monospace;
      font-weight: 700;
      text-shadow: 2px 2px 0 rgba(126, 119, 108, 0.16);
    }

    .bubble-text {
      position: relative;
      z-index: 1;
      display: flex;
      width: 100%;
      min-height: 0;
      align-items: center;
      justify-content: center;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      text-align: center;
      font-size: var(--text-size);
      font-weight: 520;
      line-height: var(--bubble-line);
    }

    .sticker-layer {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .sticker {
      position: absolute;
      display: grid;
      place-items: center;
      min-width: 24px;
      min-height: 24px;
      color: rgba(135, 131, 124, var(--sticker-opacity));
      font-weight: 800;
      line-height: 1;
      white-space: pre;
      text-shadow: 0 1px 8px rgba(70,63,54,0.08);
      transform-origin: 50% 50%;
      user-select: none;
      pointer-events: auto;
      touch-action: none;
    }

    .sticker.text-sticker {
      width: max-content;
      min-width: max-content;
      height: auto;
      min-height: 0;
      padding: 2px 4px;
    }

    .sticker.selected {
      outline: 1px dashed rgba(79, 70, 229, 0.52);
      outline-offset: 5px;
    }

    .sticker-delete {
      position: absolute;
      top: -18px;
      right: -18px;
      z-index: 10;
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: rgba(44, 41, 37, 0.9);
      color: #fff;
      box-shadow: 0 6px 16px rgba(44, 41, 37, 0.18);
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
      pointer-events: auto;
      touch-action: manipulation;
    }

    .sticker-resize {
      position: absolute;
      right: -17px;
      bottom: -17px;
      z-index: 10;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: #fff;
      box-shadow: 0 6px 16px rgba(44, 41, 37, 0.16), inset 0 0 0 1px rgba(44, 41, 37, 0.14);
      cursor: nwse-resize;
      pointer-events: auto;
      touch-action: none;
    }

    .sticker-resize::before {
      content: "";
      position: absolute;
      right: 6px;
      bottom: 6px;
      width: 8px;
      height: 8px;
      border-right: 2px solid rgba(44, 41, 37, 0.62);
      border-bottom: 2px solid rgba(44, 41, 37, 0.62);
    }

    .sticker svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .control-pane {
      align-self: start;
      position: sticky;
      top: 28px;
      overflow-y: auto;
      max-height: calc(100vh - 56px);
      padding-right: 6px;
      scrollbar-gutter: stable;
    }

    .control-pane::-webkit-scrollbar {
      width: 8px;
    }

    .control-pane::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(82, 75, 66, 0.18);
    }

    .panel {
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 30px;
      background: var(--panel);
      box-shadow: 0 18px 54px rgba(74, 66, 55, 0.11);
      backdrop-filter: blur(18px);
      padding: 18px;
    }

    .panel + .panel {
      margin-top: 16px;
    }

    .selected-panel {
      position: sticky;
      top: 16px;
      z-index: 20;
      border-color: rgba(44, 41, 37, 0.14);
      background: rgba(255, 253, 249, 0.92);
    }

    .panel-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin: 2px 2px 15px;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 14px;
      line-height: 1.2;
      font-weight: 780;
    }

    .panel-title span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .field {
      display: grid;
      grid-template-columns: 130px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      border-top: 1px solid var(--line);
      padding: 13px 2px;
    }

    .field:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .field label,
    .field-name {
      min-width: 0;
      color: #5b554e;
      font-size: 13px;
      font-weight: 700;
    }

    .field small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      line-height: 1.35;
    }

    select,
    textarea,
    input[type="text"],
    input[type="number"] {
      width: 100%;
      border: 1px solid rgba(65,58,48,0.1);
      border-radius: 16px;
      background: rgba(255,255,255,0.74);
      color: var(--ink);
      outline: none;
      padding: 10px 12px;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.45;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #6f6a63;
    }

    .switch {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      width: 64px;
      height: 34px;
      border-radius: 999px;
      background: #ddd8cf;
      padding: 4px;
      transition: background 160ms ease;
    }

    .switch.on {
      background: #6b645b;
    }

    .switch span {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 3px 10px rgba(0,0,0,0.14);
      transition: transform 160ms ease;
    }

    .switch.on span {
      transform: translateX(30px);
    }

    .button-row,
    .sticker-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      min-height: 38px;
      border-radius: 14px;
      background: #2c2925;
      color: #fff;
      padding: 0 13px;
      font-size: 12px;
      font-weight: 750;
    }

    .btn.secondary {
      background: rgba(44,41,37,0.07);
      color: #3d3934;
    }

    .btn.danger {
      background: #ffe8e8;
      color: #a43b3b;
    }

    .sticker-btn {
      display: grid;
      place-items: center;
      width: 48px;
      height: 42px;
      border-radius: 15px;
      background: rgba(255,255,255,0.78);
      color: #77716a;
      font-size: 19px;
      box-shadow: inset 0 0 0 1px rgba(65,58,48,0.08);
    }

    .selected-empty {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .code-box {
      overflow: auto;
      max-height: 170px;
      border-radius: 18px;
      background: #292621;
      color: #f8f4ed;
      padding: 13px;
      font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre;
    }

    @media (max-width: 940px) {
      .app {
        grid-template-columns: 1fr;
        padding: 16px;
      }

      .stage-shell {
        position: relative;
        top: auto;
        min-height: auto;
      }

      .stage {
        min-height: 560px;
      }

      .control-pane {
        position: relative;
        top: auto;
        overflow: visible;
        max-height: none;
        padding-right: 0;
      }

      .field {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="preview-pane">
      <div class="topbar">
        <div>
          <h1>气泡自定义</h1>
          <div class="subtitle">独立本地小工具：调主体材质、边缘柔化、阴影和周围贴纸。配置会存在浏览器本地。</div>
        </div>
      </div>

      <div class="stage-shell">
        <div class="stage">
          <div class="phone">
            <div class="phone-title">
              <span>Preview</span>
              <span id="materialLabel">Soft White</span>
            </div>
            <div class="bubble-wrap" id="bubbleWrap">
              <div class="bubble-core" id="bubbleCore">
                <div class="bubble-text" id="bubbleText">大家好！
&gt;&gt; - &lt;&lt;</div>
              </div>
              <div class="sticker-layer" id="stickerLayer"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <aside class="control-pane">
      <section class="panel selected-panel">
        <div class="panel-title">
          <h2>选中素材</h2>
          <span id="selectedHint">未选中</span>
        </div>
        <div id="selectedControls" class="selected-empty">点一下预览里的贴纸，就能在这里调大小、旋转、复制和删除。</div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>气泡主体</h2>
          <span>Body</span>
        </div>

        <div class="field">
          <label for="message">预览文字</label>
          <textarea id="message">大家好！
&gt;&gt; - &lt;&lt;</textarea>
        </div>

        <div class="field">
          <label for="material">材质</label>
          <select id="material">
            <option value="soft">白软</option>
            <option value="emboss">浮雕</option>
            <option value="jelly">果冻</option>
            <option value="pixel">像素</option>
            <option value="frosted">雾面</option>
          </select>
        </div>

        <div class="field">
          <label for="radius">圆角 <small><span id="radiusValue"></span>px</small></label>
          <input id="radius" type="range" min="18" max="54" step="1" />
        </div>

        <div class="field">
          <label for="bubbleWidth">最大宽度 <small><span id="bubbleWidthValue"></span>px</small></label>
          <input id="bubbleWidth" type="range" min="96" max="360" step="1" />
        </div>

        <div class="field">
          <div class="field-name">固定宽度 <small>关：像 app 一样贴内容；开：宽度滑块直接改变气泡大小</small></div>
          <button class="switch" id="fixedWidthToggle" type="button" aria-label="固定宽度"><span></span></button>
        </div>

        <div class="field">
          <label for="bubbleHeight">最小高度 <small><span id="bubbleHeightValue"></span>px</small></label>
          <input id="bubbleHeight" type="range" min="0" max="180" step="1" />
        </div>

        <div class="field">
          <label for="paddingY">上下留白 <small><span id="paddingYValue"></span>px</small></label>
          <input id="paddingY" type="range" min="4" max="28" step="1" />
        </div>

        <div class="field">
          <label for="paddingX">左右留白 <small><span id="paddingXValue"></span>px</small></label>
          <input id="paddingX" type="range" min="8" max="36" step="1" />
        </div>

        <div class="field">
          <label for="lineHeight">行距 <small><span id="lineHeightValue"></span></small></label>
          <input id="lineHeight" type="range" min="1.2" max="1.8" step="0.01" />
        </div>

        <div class="field">
          <label for="textSize">文字大小 <small><span id="textSizeValue"></span>px</small></label>
          <input id="textSize" type="range" min="12" max="18" step="1" />
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>边缘与阴影</h2>
          <span>Edge</span>
        </div>

        <div class="field">
          <div class="field-name">边缘柔化 <small>关掉就是硬边白卡</small></div>
          <button class="switch" id="edgeBlurToggle" type="button" aria-label="边缘柔化"><span></span></button>
        </div>

        <div class="field">
          <label for="edgeBlur">柔化半径 <small><span id="edgeBlurValue"></span>px</small></label>
          <input id="edgeBlur" type="range" min="0" max="16" step="1" />
        </div>

        <div class="field">
          <label for="shadowY">阴影距离 <small><span id="shadowYValue"></span>px</small></label>
          <input id="shadowY" type="range" min="0" max="36" step="1" />
        </div>

        <div class="field">
          <label for="shadowBlur">阴影扩散 <small><span id="shadowBlurValue"></span>px</small></label>
          <input id="shadowBlur" type="range" min="0" max="64" step="1" />
        </div>

        <div class="field">
          <label for="shadowOpacity">阴影浓度 <small><span id="shadowOpacityValue"></span>%</small></label>
          <input id="shadowOpacity" type="range" min="0" max="42" step="1" />
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>周围贴纸</h2>
          <span>Sticker</span>
        </div>

        <div class="field">
          <div class="field-name">添加贴纸 <small>添加后可以直接拖动</small></div>
          <div class="sticker-palette">
            <button class="sticker-btn" type="button" data-add="star">✦</button>
            <button class="sticker-btn" type="button" data-add="spark">✧</button>
            <button class="sticker-btn" type="button" data-add="wing">翼</button>
            <button class="sticker-btn" type="button" data-add="dots">...</button>
            <button class="sticker-btn" type="button" data-add="face">&gt;^&lt;</button>
          </div>
        </div>

        <div class="field">
          <label for="customSticker">自定义文字</label>
          <div class="button-row">
            <input id="customSticker" type="text" placeholder="比如 ☆、小翅膀、颜文字" />
            <button class="btn secondary" type="button" id="addCustomSticker">添加</button>
          </div>
        </div>

        <div class="field">
          <div class="field-name">图片贴纸 <small>透明 PNG 最好</small></div>
          <input id="imageSticker" type="file" accept="image/*" />
        </div>

        <div class="field">
          <label for="stickerOpacity">贴纸透明度 <small><span id="stickerOpacityValue"></span>%</small></label>
          <input id="stickerOpacity" type="range" min="10" max="100" step="1" />
        </div>

        <div class="field">
          <div class="field-name">管理贴纸 <small>选中后顶部会出现快捷调整</small></div>
          <button class="btn danger" type="button" id="clearStickers">清空全部贴纸</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>配置</h2>
          <span>Config</span>
        </div>
        <div class="button-row">
          <button class="btn" type="button" id="copyCss">复制 CSS</button>
          <button class="btn secondary" type="button" id="downloadCss">下载 CSS</button>
          <button class="btn secondary" type="button" id="copyJson">复制 JSON</button>
          <button class="btn secondary" type="button" id="downloadJson">下载配置</button>
          <button class="btn secondary" type="button" id="exportSvg">下载 SVG</button>
          <button class="btn danger" type="button" id="resetAll">重置</button>
          <label class="btn secondary" style="display:inline-flex;align-items:center;">
            导入配置
            <input id="importJson" type="file" accept="application/json,.json" style="display:none;" />
          </label>
        </div>
        <div class="code-box" id="codeBox" aria-live="polite"></div>
      </section>
    </aside>
  </main>

  <script>
    const STORAGE_KEY = "sumitalk.local.bubble-customizer.v1";
    const materials = {
      soft: {
        label: "白软",
        bg: "#fffdf9",
        texture: "none",
        textureOpacity: 0,
      },
      emboss: {
        label: "浮雕",
        bg: "#f7f3eb",
        texture: "radial-gradient(circle at 22% 18%, rgba(255,255,255,.78), transparent 30%), radial-gradient(circle at 78% 82%, rgba(168,158,144,.16), transparent 32%)",
        textureOpacity: 0.5,
      },
      jelly: {
        label: "果冻",
        bg: "linear-gradient(145deg, rgba(255,255,255,.92) 0%, rgba(255,249,239,.72) 55%, rgba(235,225,211,.62) 100%)",
        texture: "radial-gradient(ellipse at 32% 18%, rgba(255,255,255,.9) 0 18%, transparent 42%), linear-gradient(180deg, rgba(255,255,255,.24), rgba(190,179,163,.12))",
        textureOpacity: 0.8,
      },
      pixel: {
        label: "像素",
        bg: "#fffdf7",
        texture: "none",
        textureOpacity: 0,
      },
      frosted: {
        label: "雾面",
        bg: "rgba(255,255,255,.72)",
        texture: "linear-gradient(135deg, rgba(255,255,255,.56), rgba(255,255,255,0)), radial-gradient(circle at 70% 85%, rgba(190,181,169,.18), transparent 32%)",
        textureOpacity: 0.62,
      },
    };

    const stickerTemplates = {
      star: { type: "text", value: "✦", x: 74, y: 18, size: 21, rotate: -12 },
      spark: { type: "text", value: "✧", x: 206, y: 12, size: 22, rotate: 14 },
      dots: { type: "text", value: "· · ·", x: 196, y: 66, size: 16, rotate: 8 },
      face: { type: "text", value: ">^<", x: 132, y: 72, size: 16, rotate: 0 },
      wing: {
        type: "svg",
        value: "<svg viewBox='0 0 64 48'><path d='M7 31c11-17 23-23 33-16 6 4 8 11 5 19-8-4-15-4-24 0 7 0 13 3 18 8-13 1-24-2-32-11Z' fill='currentColor' opacity='.52'/><path d='M19 28c8-8 16-11 24-8M19 35c8-4 15-5 22-2' stroke='currentColor' stroke-width='3' stroke-linecap='round' opacity='.45'/></svg>",
        x: 78,
        y: 38,
        size: 34,
        rotate: -18,
      },
    };

    const defaults = {
      layoutVersion: 7,
      message: "大家好！\n>> - <<",
      material: "soft",
      fixedWidth: false,
      bubbleWidth: 260,
      bubbleHeight: 0,
      radius: 18,
      paddingX: 12,
      paddingY: 6,
      lineHeight: 1.45,
      textSize: 13,
      edgeBlurEnabled: false,
      edgeBlur: 0,
      shadowY: 1,
      shadowBlur: 2,
      shadowOpacity: 5,
      stickerOpacity: 58,
      stickers: [
        { id: cryptoId(), ...stickerTemplates.wing },
        { id: cryptoId(), ...stickerTemplates.star, x: 205, y: 16 },
        { id: cryptoId(), ...stickerTemplates.face, x: 132, y: 72 },
      ],
    };

    let state = readState();
    let selectedStickerId = "";
    let drag = null;
    let resize = null;

    const el = {
      root: document.documentElement,
      bubbleCore: document.getElementById("bubbleCore"),
      bubbleText: document.getElementById("bubbleText"),
      bubbleWrap: document.getElementById("bubbleWrap"),
      stickerLayer: document.getElementById("stickerLayer"),
      materialLabel: document.getElementById("materialLabel"),
      codeBox: document.getElementById("codeBox"),
      selectedControls: document.getElementById("selectedControls"),
      selectedHint: document.getElementById("selectedHint"),
    };

    const inputs = {
      message: document.getElementById("message"),
      material: document.getElementById("material"),
      bubbleWidth: document.getElementById("bubbleWidth"),
      bubbleHeight: document.getElementById("bubbleHeight"),
      radius: document.getElementById("radius"),
      paddingX: document.getElementById("paddingX"),
      paddingY: document.getElementById("paddingY"),
      lineHeight: document.getElementById("lineHeight"),
      textSize: document.getElementById("textSize"),
      edgeBlur: document.getElementById("edgeBlur"),
      shadowY: document.getElementById("shadowY"),
      shadowBlur: document.getElementById("shadowBlur"),
      shadowOpacity: document.getElementById("shadowOpacity"),
      stickerOpacity: document.getElementById("stickerOpacity"),
      customSticker: document.getElementById("customSticker"),
      imageSticker: document.getElementById("imageSticker"),
    };

    function cryptoId() {
      return `st_${Math.random().toString(36).slice(2)}_${Date.now().toString(36)}`;
    }

    function readState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return structuredClone(defaults);
        const parsed = JSON.parse(raw);
        const next = { ...structuredClone(defaults), ...parsed };
        if (parsed.layoutVersion !== defaults.layoutVersion) {
          next.layoutVersion = defaults.layoutVersion;
          next.bubbleWidth = Math.min(Number(next.bubbleWidth) || defaults.bubbleWidth, defaults.bubbleWidth);
          next.bubbleHeight = defaults.bubbleHeight;
          next.radius = defaults.radius;
          next.paddingX = defaults.paddingX;
          next.paddingY = defaults.paddingY;
          next.textSize = defaults.textSize;
          next.edgeBlurEnabled = defaults.edgeBlurEnabled;
          next.edgeBlur = defaults.edgeBlur;
          next.shadowY = defaults.shadowY;
          next.shadowBlur = defaults.shadowBlur;
          next.shadowOpacity = defaults.shadowOpacity;
          next.fixedWidth = false;
          if (Array.isArray(next.stickers)) {
            next.stickers = next.stickers.map((item) => ({
              ...item,
              x: Math.round((Number(item.x) || 0) * 0.72),
              y: Math.round((Number(item.y) || 0) * 0.55),
              size: Math.round((Number(item.size) || 28) * 0.76),
            }));
          }
        }
        return normalizeImportedState(next);
      } catch {
        return structuredClone(defaults);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function setRootVar(name, value) {
      el.root.style.setProperty(name, value);
    }

    function bindInput(key, parser = (v) => v) {
      const input = inputs[key];
      input.addEventListener("input", () => {
        state[key] = parser(input.value);
        render();
      });
    }

    bindInput("message");
    bindInput("material");
    bindInput("bubbleWidth", Number);
    bindInput("bubbleHeight", Number);
    bindInput("radius", Number);
    bindInput("paddingX", Number);
    bindInput("paddingY", Number);
    bindInput("lineHeight", Number);
    bindInput("textSize", Number);
    bindInput("edgeBlur", Number);
    bindInput("shadowY", Number);
    bindInput("shadowBlur", Number);
    bindInput("shadowOpacity", Number);
    bindInput("stickerOpacity", Number);

    document.getElementById("edgeBlurToggle").addEventListener("click", () => {
      state.edgeBlurEnabled = !state.edgeBlurEnabled;
      render();
    });

    document.getElementById("fixedWidthToggle").addEventListener("click", () => {
      state.fixedWidth = !state.fixedWidth;
      render();
    });

    document.querySelectorAll("[data-add]").forEach((button) => {
      button.addEventListener("click", () => addSticker(button.dataset.add));
    });

    document.getElementById("addCustomSticker").addEventListener("click", () => {
      const value = inputs.customSticker.value.trim();
      if (!value) return;
      state.stickers.push({ id: cryptoId(), type: "text", value, x: 180, y: 122, size: 23, rotate: 0 });
      selectedStickerId = state.stickers.at(-1).id;
      inputs.customSticker.value = "";
      render();
    });

    document.getElementById("clearStickers").addEventListener("click", () => {
      state.stickers = [];
      selectedStickerId = "";
      render();
    });

    inputs.imageSticker.addEventListener("change", () => {
      const file = inputs.imageSticker.files && inputs.imageSticker.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        state.stickers.push({ id: cryptoId(), type: "image", value: String(reader.result || ""), x: 278, y: 24, size: 48, rotate: 0 });
        selectedStickerId = state.stickers.at(-1).id;
        inputs.imageSticker.value = "";
        render();
      };
      reader.readAsDataURL(file);
    });

    document.querySelector(".preview-pane").addEventListener("pointerdown", (event) => {
      if (!selectedStickerId) return;
      if (!(event.target instanceof Element)) return;
      if (event.target.closest(".sticker")) return;
      selectedStickerId = "";
      drag = null;
      render();
    });

    document.getElementById("copyCss").addEventListener("click", async () => {
      const css = buildCssSnippet();
      await copyText(css);
      flashCode(css, "CSS 已复制");
    });

    document.getElementById("downloadCss").addEventListener("click", () => {
      downloadText("sumitalk-bubble.css", buildCssSnippet(), "text/css");
    });

    document.getElementById("copyJson").addEventListener("click", async () => {
      const json = JSON.stringify(state, null, 2);
      await copyText(json);
      flashCode(json, "JSON 已复制");
    });

    document.getElementById("downloadJson").addEventListener("click", () => {
      downloadText("sumitalk-bubble-config.json", JSON.stringify(state, null, 2), "application/json");
    });

    document.getElementById("importJson").addEventListener("change", (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const next = JSON.parse(String(reader.result || "{}"));
          state = normalizeImportedState(next);
          selectedStickerId = "";
          render();
        } catch (error) {
          flashCode(String(error && error.message ? error.message : error), "配置读取失败");
        } finally {
          event.target.value = "";
        }
      };
      reader.readAsText(file);
    });

    document.getElementById("resetAll").addEventListener("click", () => {
      state = structuredClone(defaults);
      selectedStickerId = "";
      render();
    });

    document.getElementById("exportSvg").addEventListener("click", () => {
      const svg = buildSvgExport();
      const blob = new Blob([svg], { type: "image/svg+xml" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "sumitalk-bubble.svg";
      a.click();
      URL.revokeObjectURL(url);
    });

    function addSticker(kind) {
      const template = stickerTemplates[kind];
      if (!template) return;
      state.stickers.push({ id: cryptoId(), ...structuredClone(template) });
      selectedStickerId = state.stickers.at(-1).id;
      render();
    }

    function render() {
      const material = materials[state.material] || materials.soft;
      inputs.message.value = state.message;
      inputs.material.value = state.material;
      inputs.bubbleWidth.value = state.bubbleWidth;
      inputs.bubbleHeight.value = state.bubbleHeight;
      inputs.radius.value = state.radius;
      inputs.paddingX.value = state.paddingX;
      inputs.paddingY.value = state.paddingY;
      inputs.lineHeight.value = state.lineHeight;
      inputs.textSize.value = state.textSize;
      inputs.edgeBlur.value = state.edgeBlur;
      inputs.shadowY.value = state.shadowY;
      inputs.shadowBlur.value = state.shadowBlur;
      inputs.shadowOpacity.value = state.shadowOpacity;
      inputs.stickerOpacity.value = state.stickerOpacity;

      setText("bubbleWidthValue", state.bubbleWidth);
      setText("bubbleHeightValue", state.bubbleHeight);
      setText("radiusValue", state.radius);
      setText("paddingXValue", state.paddingX);
      setText("paddingYValue", state.paddingY);
      setText("lineHeightValue", state.lineHeight.toFixed(2));
      setText("textSizeValue", state.textSize);
      setText("edgeBlurValue", state.edgeBlur);
      setText("shadowYValue", state.shadowY);
      setText("shadowBlurValue", state.shadowBlur);
      setText("shadowOpacityValue", state.shadowOpacity);
      setText("stickerOpacityValue", state.stickerOpacity);

      setRootVar("--bubble-bg", material.bg);
      setRootVar("--material-texture", material.texture);
      setRootVar("--material-texture-opacity", material.textureOpacity);
      setRootVar("--bubble-width", `${state.bubbleWidth}px`);
      setRootVar("--bubble-render-width", state.fixedWidth ? `${state.bubbleWidth}px` : "fit-content");
      setRootVar("--bubble-height", `${state.bubbleHeight}px`);
      setRootVar("--bubble-radius", `${state.radius}px`);
      setRootVar("--bubble-pad-x", `${state.paddingX}px`);
      setRootVar("--bubble-pad-y", `${state.paddingY}px`);
      setRootVar("--bubble-line", state.lineHeight);
      setRootVar("--text-size", `${state.textSize}px`);
      setRootVar("--bubble-edge-blur", `${state.edgeBlurEnabled ? state.edgeBlur : 0}px`);
      setRootVar("--edge-blur-opacity", state.edgeBlurEnabled ? 0.55 : 0);
      setRootVar("--bubble-shadow-y", `${state.shadowY}px`);
      setRootVar("--bubble-shadow-blur", `${state.shadowBlur}px`);
      setRootVar("--bubble-shadow-opacity", state.shadowOpacity / 100);
      setRootVar("--sticker-opacity", state.stickerOpacity / 100);

      el.materialLabel.textContent = material.label;
      el.bubbleCore.dataset.material = state.material;
      el.bubbleText.textContent = state.message || " ";
      document.getElementById("edgeBlurToggle").classList.toggle("on", !!state.edgeBlurEnabled);
      document.getElementById("fixedWidthToggle").classList.toggle("on", !!state.fixedWidth);
      renderStickers();
      renderSelectedControls();
      el.codeBox.textContent = buildCssSnippet();
      saveState();
    }

    function setText(id, value) {
      document.getElementById(id).textContent = String(value);
    }

    function renderStickers() {
      el.stickerLayer.innerHTML = "";
      for (const sticker of state.stickers) {
        const node = document.createElement("div");
        const isTextSticker = sticker.type !== "svg" && sticker.type !== "image";
        node.className = `sticker ${isTextSticker ? "text-sticker" : ""} ${sticker.id === selectedStickerId ? "selected" : ""}`;
        node.dataset.id = sticker.id;
        node.style.left = `${sticker.x}px`;
        node.style.top = `${sticker.y}px`;
        node.style.width = isTextSticker ? "max-content" : `${sticker.size}px`;
        node.style.height = isTextSticker ? "auto" : `${sticker.size}px`;
        node.style.fontSize = `${sticker.size}px`;
        node.style.transform = `rotate(${sticker.rotate || 0}deg)`;
        if (sticker.type === "svg") {
          node.innerHTML = sticker.value;
        } else if (sticker.type === "image") {
          const img = document.createElement("img");
          img.src = sticker.value;
          img.alt = "";
          img.style.width = "100%";
          img.style.height = "100%";
          img.style.objectFit = "contain";
          node.appendChild(img);
        } else {
          node.textContent = sticker.value;
        }
        if (sticker.id === selectedStickerId) {
          const deleteButton = document.createElement("button");
          deleteButton.type = "button";
          deleteButton.className = "sticker-delete";
          deleteButton.textContent = "×";
          deleteButton.title = "删除贴纸";
          deleteButton.setAttribute("aria-label", "删除贴纸");
          deleteButton.addEventListener("pointerdown", (event) => {
            event.preventDefault();
            event.stopPropagation();
          });
          deleteButton.addEventListener("pointerup", (event) => {
            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
            removeSticker(sticker.id);
          });
          deleteButton.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
            removeSticker(sticker.id);
          });
          node.appendChild(deleteButton);
          const resizeHandle = document.createElement("button");
          resizeHandle.type = "button";
          resizeHandle.className = "sticker-resize";
          resizeHandle.title = "拖动等比缩放";
          resizeHandle.setAttribute("aria-label", "拖动等比缩放");
          resizeHandle.addEventListener("pointerdown", (event) => {
            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
            selectedStickerId = sticker.id;
            drag = null;
            const rect = node.getBoundingClientRect();
            resize = {
              id: sticker.id,
              startSize: sticker.size,
              originX: rect.left,
              originY: rect.top,
              startDistance: Math.max(1, Math.hypot(event.clientX - rect.left, event.clientY - rect.top)),
            };
            try {
              resizeHandle.setPointerCapture(event.pointerId);
            } catch {
              // Synthetic pointer events used by local verification may not be capturable.
            }
          });
          node.appendChild(resizeHandle);
        }
        node.addEventListener("pointerdown", onStickerPointerDown);
        el.stickerLayer.appendChild(node);
      }
    }

    function updateStickerNodeSize(sticker) {
      const node = el.stickerLayer.querySelector(`[data-id="${sticker.id}"]`);
      if (!node) return;
      const isTextSticker = sticker.type !== "svg" && sticker.type !== "image";
      node.style.width = isTextSticker ? "max-content" : `${sticker.size}px`;
      node.style.height = isTextSticker ? "auto" : `${sticker.size}px`;
      node.style.fontSize = `${sticker.size}px`;
      const sizeInput = document.getElementById("selectedSize");
      if (sizeInput) sizeInput.value = String(sticker.size);
    }

    function onStickerPointerDown(event) {
      event.stopPropagation();
      const id = event.currentTarget.dataset.id;
      const sticker = state.stickers.find((item) => item.id === id);
      if (!sticker) return;
      selectedStickerId = id;
      resize = null;
      const rect = el.bubbleWrap.getBoundingClientRect();
      drag = {
        id,
        startX: event.clientX,
        startY: event.clientY,
        originX: sticker.x,
        originY: sticker.y,
        rect,
      };
      try {
        event.currentTarget.setPointerCapture(event.pointerId);
      } catch {
        // Synthetic pointer events used by local verification may not be capturable.
      }
      render();
    }

    window.addEventListener("pointermove", (event) => {
      if (resize) {
        const sticker = state.stickers.find((item) => item.id === resize.id);
        if (!sticker) return;
        const distance = Math.max(1, Math.hypot(event.clientX - resize.originX, event.clientY - resize.originY));
        const scale = distance / resize.startDistance;
        sticker.size = clampNumber(Math.round(resize.startSize * scale), 10, 180, resize.startSize);
        updateStickerNodeSize(sticker);
        saveState();
        return;
      }
      if (!drag) return;
      const sticker = state.stickers.find((item) => item.id === drag.id);
      if (!sticker) return;
      sticker.x = Math.round(drag.originX + event.clientX - drag.startX);
      sticker.y = Math.round(drag.originY + event.clientY - drag.startY);
      renderStickers();
      saveState();
    });

    window.addEventListener("pointerup", () => {
      drag = null;
      resize = null;
      render();
    });

    function renderSelectedControls() {
      const sticker = state.stickers.find((item) => item.id === selectedStickerId);
      if (!sticker) {
        el.selectedHint.textContent = "还没选中贴纸";
        el.selectedControls.className = "selected-empty";
        el.selectedControls.textContent = "点一下预览里的贴纸，就能调大小和旋转。";
        return;
      }
      el.selectedHint.textContent = sticker.type === "image"
        ? "图片贴纸"
        : sticker.type === "svg"
          ? "图形贴纸"
          : sticker.value.slice(0, 12);
      el.selectedControls.className = "";
      el.selectedControls.innerHTML = `
        <div class="field" style="grid-template-columns: 72px 1fr; padding-top:0;">
          <label for="selectedSize">大小</label>
          <input id="selectedSize" type="range" min="10" max="180" step="1" value="${sticker.size}">
        </div>
        <div class="field" style="grid-template-columns: 72px 1fr;">
          <label for="selectedRotate">旋转</label>
          <input id="selectedRotate" type="range" min="-45" max="45" step="1" value="${sticker.rotate || 0}">
        </div>
        <div class="button-row" style="margin-top:10px;">
          <button class="btn secondary" type="button" id="duplicateSticker">复制</button>
          <button class="btn danger" type="button" data-remove-selected="true">删除</button>
        </div>
      `;
      document.getElementById("selectedSize").addEventListener("input", (event) => {
        sticker.size = Number(event.target.value);
        render();
      });
      document.getElementById("selectedRotate").addEventListener("input", (event) => {
        sticker.rotate = Number(event.target.value);
        render();
      });
      document.getElementById("duplicateSticker").addEventListener("click", () => {
        const copy = { ...structuredClone(sticker), id: cryptoId(), x: sticker.x + 18, y: sticker.y + 18 };
        state.stickers.push(copy);
        selectedStickerId = copy.id;
        render();
      });
      const removeButton = el.selectedControls.querySelector("[data-remove-selected]");
      if (removeButton) {
        const removeCurrentSticker = (event) => {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
          removeSticker(sticker.id);
        };
        removeButton.addEventListener("pointerup", removeCurrentSticker);
        removeButton.addEventListener("click", removeCurrentSticker);
      }
    }

    function removeSticker(id) {
      state.stickers = state.stickers.filter((item) => item.id !== id);
      if (selectedStickerId === id) selectedStickerId = "";
      render();
    }

    function buildCssSnippet() {
      const material = materials[state.material] || materials.soft;
      const isPixel = state.material === "pixel";
      const pixelClip = "polygon(0 12px, 12px 12px, 12px 0, calc(100% - 12px) 0, calc(100% - 12px) 12px, 100% 12px, 100% calc(100% - 12px), calc(100% - 12px) calc(100% - 12px), calc(100% - 12px) 100%, 12px 100%, 12px calc(100% - 12px), 0 calc(100% - 12px))";
      const imageStickerNote = state.stickers.some((item) => item.type === "image")
        ? "\n * 注意：当前配置包含上传图片贴纸。图片贴纸已保存在上方 JSON 的 dataURL 中，真正接入 app 时请使用 JSON 或把图片转成资源 URL。"
        : "";
      return `/* SumiTalk bubble config
${JSON.stringify(state, null, 2)
  .split("\n")
  .map((line) => ` * ${line}`)
  .join("\n")}${imageStickerNote}
 */

.sumitalk-custom-bubble-wrap {
  position: relative;
  display: inline-block;
  padding: 26px;
}

.sumitalk-custom-bubble {
  position: relative;
  z-index: 2;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: ${state.fixedWidth ? `${state.bubbleWidth}px` : "fit-content"};
  max-width: ${state.bubbleWidth}px;
  min-height: ${state.bubbleHeight}px;
  border-radius: ${isPixel ? 0 : state.radius}px;
  clip-path: ${isPixel ? pixelClip : "none"};
  filter: ${isPixel ? "drop-shadow(5px 5px 0 rgba(112, 105, 94, 0.16)) drop-shadow(10px 10px 0 rgba(112, 105, 94, 0.08))" : "none"};
  background: ${material.bg};
  padding: ${state.paddingY}px ${state.paddingX}px;
  line-height: ${state.lineHeight};
  font-size: ${state.textSize}px;
  box-shadow: ${isPixel
    ? "inset 0 0 0 4px rgba(119, 112, 101, 0.18), inset 4px 4px 0 rgba(255, 255, 255, 0.72), inset -4px -4px 0 rgba(119, 112, 101, 0.12)"
    : `0 ${state.shadowY}px ${state.shadowBlur}px rgba(70, 63, 54, ${state.shadowOpacity / 100})`};
}

.sumitalk-custom-bubble::before {
  content: "";
  position: absolute;
  inset: ${isPixel ? "-4px" : "-2px"};
  z-index: -1;
  border-radius: ${isPixel ? 0 : "inherit"};
  background: ${isPixel ? "#8e8679" : "inherit"};
  filter: ${isPixel ? "none" : `blur(${state.edgeBlurEnabled ? state.edgeBlur : 0}px)`};
  opacity: ${isPixel ? 0.16 : state.edgeBlurEnabled ? 0.55 : 0};
  clip-path: ${isPixel ? "inherit" : "none"};
  transform: ${isPixel ? "translate(4px, 4px)" : "none"};
}

.sumitalk-custom-bubble::after {
  content: "";
  position: absolute;
  z-index: 0;
  pointer-events: none;
  ${isPixel ? `inset: auto;
  top: 15px;
  right: 22px;
  width: 7px;
  height: 7px;
  border-radius: 0;
  opacity: 0.34;
  background: #7f786d;
  box-shadow: -18px 10px 0 #7f786d, 16px 18px 0 #7f786d, -236px 68px 0 #7f786d, -216px 82px 0 #7f786d, -198px 64px 0 #7f786d;` : `inset: 0;
  border-radius: inherit;
  opacity: ${material.textureOpacity};
  background: ${material.texture};`}
  mix-blend-mode: multiply;
}

.sumitalk-custom-bubble-content {
  position: relative;
  z-index: 1;
  white-space: pre-wrap;
  ${isPixel ? "font-family: \"Courier New\", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, \"PingFang SC\", \"Microsoft YaHei\", monospace; font-weight: 700; text-shadow: 2px 2px 0 rgba(126, 119, 108, 0.16);" : ""}
}

.sumitalk-custom-sticker-layer {
  position: absolute;
  inset: 0;
  z-index: 3;
  pointer-events: none;
}

.sumitalk-custom-sticker {
  position: absolute;
  display: grid;
  place-items: center;
  color: rgba(135, 131, 124, ${state.stickerOpacity / 100});
  font-weight: 800;
  line-height: 1;
  text-shadow: 0 1px 8px rgba(70, 63, 54, 0.08);
}`;
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const area = document.createElement("textarea");
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
      }
    }

    function flashCode(text, message) {
      el.codeBox.textContent = `${message}\n\n${text}`;
      window.setTimeout(() => {
        el.codeBox.textContent = buildCssSnippet();
      }, 1400);
    }

    function downloadText(filename, text, type) {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function normalizeImportedState(value) {
      const next = { ...structuredClone(defaults), ...(value || {}) };
      next.layoutVersion = defaults.layoutVersion;
      next.message = String(next.message || defaults.message);
      next.material = materials[next.material] ? next.material : defaults.material;
      next.fixedWidth = !!next.fixedWidth;
      next.bubbleWidth = clampNumber(next.bubbleWidth, 96, 360, defaults.bubbleWidth);
      next.bubbleHeight = clampNumber(next.bubbleHeight, 0, 180, defaults.bubbleHeight);
      next.radius = clampNumber(next.radius, 18, 54, defaults.radius);
      next.paddingX = clampNumber(next.paddingX, 8, 36, defaults.paddingX);
      next.paddingY = clampNumber(next.paddingY, 4, 28, defaults.paddingY);
      next.lineHeight = clampNumber(next.lineHeight, 1.2, 1.8, defaults.lineHeight);
      next.textSize = clampNumber(next.textSize, 12, 18, defaults.textSize);
      next.edgeBlurEnabled = !!next.edgeBlurEnabled;
      next.edgeBlur = clampNumber(next.edgeBlur, 0, 16, defaults.edgeBlur);
      next.shadowY = clampNumber(next.shadowY, 0, 36, defaults.shadowY);
      next.shadowBlur = clampNumber(next.shadowBlur, 0, 64, defaults.shadowBlur);
      next.shadowOpacity = clampNumber(next.shadowOpacity, 0, 42, defaults.shadowOpacity);
      next.stickerOpacity = clampNumber(next.stickerOpacity, 10, 100, defaults.stickerOpacity);
      next.stickers = Array.isArray(next.stickers) ? next.stickers.map((item) => ({
        id: String(item.id || cryptoId()),
        type: ["text", "svg", "image"].includes(item.type) ? item.type : "text",
        value: String(item.value || "✦"),
        x: clampNumber(item.x, -80, 420, 120),
        y: clampNumber(item.y, -80, 260, 40),
        size: clampNumber(item.size, 10, 180, 28),
        rotate: clampNumber(item.rotate, -45, 45, 0),
      })) : [];
      return next;
    }

    function clampNumber(value, min, max, fallback) {
      const n = Number(value);
      if (!Number.isFinite(n)) return fallback;
      return Math.max(min, Math.min(max, n));
    }

    function escapeXml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function buildSvgExport() {
      const material = materials[state.material] || materials.soft;
      const lines = String(state.message || "").split("\n");
      const estimatedTextWidth = Math.max(...lines.map((line) => estimateTextWidth(line, state.textSize)), 1);
      const renderedBubbleWidth = state.fixedWidth
        ? state.bubbleWidth
        : Math.min(state.bubbleWidth, Math.max(1, Math.ceil(estimatedTextWidth + state.paddingX * 2)));
      const lineStep = state.textSize * state.lineHeight;
      const renderedBubbleHeight = Math.max(state.bubbleHeight, Math.ceil(lines.length * lineStep + state.paddingY * 2));
      const canvasWidth = renderedBubbleWidth + 108;
      const canvasHeight = Math.max(150, renderedBubbleHeight + 100);
      const bubbleX = 54;
      const bubbleY = 42;
      const textX = bubbleX + renderedBubbleWidth / 2;
      const textY = bubbleY + renderedBubbleHeight / 2 - ((lines.length - 1) * lineStep) / 2 + state.textSize * 0.35;
      const stickerSvg = state.stickers.map((sticker) => {
        const transform = `translate(${sticker.x} ${sticker.y}) rotate(${sticker.rotate || 0} ${sticker.size / 2} ${sticker.size / 2})`;
        if (sticker.type === "svg") {
          return `<g transform="${transform}" opacity="${state.stickerOpacity / 100}" color="#8f8980" width="${sticker.size}" height="${sticker.size}">${sticker.value}</g>`;
        }
        if (sticker.type === "image") return "";
        return `<text x="${sticker.x}" y="${sticker.y + sticker.size}" opacity="${state.stickerOpacity / 100}" fill="#8f8980" font-size="${sticker.size}" font-weight="800" transform="rotate(${sticker.rotate || 0} ${sticker.x} ${sticker.y})">${escapeXml(sticker.value)}</text>`;
      }).join("\n");
      const textSvg = lines.map((line, index) => (
        `<tspan x="${textX}" y="${textY + index * lineStep}">${escapeXml(line)}</tspan>`
      )).join("");
      return `<svg width="${canvasWidth}" height="${canvasHeight}" viewBox="0 0 ${canvasWidth} ${canvasHeight}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="${state.shadowY}" stdDeviation="${state.shadowBlur / 2}" flood-color="#463f36" flood-opacity="${state.shadowOpacity / 100}"/></filter>
    <filter id="edge"><feGaussianBlur stdDeviation="${state.edgeBlurEnabled ? state.edgeBlur : 0}"/></filter>
  </defs>
  <rect width="${canvasWidth}" height="${canvasHeight}" fill="#f5f3ef"/>
  <rect x="${bubbleX}" y="${bubbleY}" width="${renderedBubbleWidth}" height="${renderedBubbleHeight}" rx="${state.radius}" fill="${material.bg.startsWith("#") ? material.bg : "#fffdf9"}" filter="url(#edge)" opacity="${state.edgeBlurEnabled ? 0.55 : 0}"/>
  <rect x="${bubbleX}" y="${bubbleY}" width="${renderedBubbleWidth}" height="${renderedBubbleHeight}" rx="${state.radius}" fill="${material.bg.startsWith("#") ? material.bg : "#fffdf9"}" filter="url(#shadow)"/>
  ${stickerSvg}
  <text text-anchor="middle" fill="#56524d" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, Microsoft YaHei, sans-serif" font-size="${state.textSize}" font-weight="520">${textSvg}</text>
</svg>`;
    }

    function estimateTextWidth(text, fontSize) {
      return Array.from(String(text || "")).reduce((total, char) => {
        return total + fontSize * (char.charCodeAt(0) < 128 ? 0.58 : 1);
      }, 0);
    }

    render();
  </script>
</body>
</html>
